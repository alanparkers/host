name: Free_RDP_No_Tokens
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Enable RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          net user runneradmin P@ssw0rd123 /add
          net localgroup administrators runneradmin /add

      - name: Start Cloudflare Quick Tunnel
        run: |
          Invoke-WebRequest -Uri https://github.com -OutFile cloudflared.exe
          # This starts a tunnel without a token
          Start-Process .\cloudflared.exe -ArgumentList "tunnel --url tcp://localhost:3389"
          
      - name: Keep Alive
        run: |
          $start = Get-Date
          while ((Get-Date) -lt $start.AddHours(6)) {
            Write-Host "Check the log above for the .trycloudflare.com link!"
            Start-Sleep -Seconds 60
          }
